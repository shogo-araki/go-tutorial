# Air設定ファイル（ホットリロード）
# 参考: https://github.com/air-verse/air
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/api"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor"]
  delay = 300

[log]
  time = false

[misc]
  clean_on_exit = true
